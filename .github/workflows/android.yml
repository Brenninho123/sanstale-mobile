name: Android Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout game
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r25c
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager "ndk;25.2.9519653"

      - name: Clone love-android
        run: git clone --depth 1 https://github.com/love2d/love-android love-android

      - name: Package game as .love
        run: |
          zip -9 -r love-android/app/src/main/assets/game.love . \
            -x "*.git*"        \
            -x ".github/*"     \
            -x "android.yml"   \
            -x "makefile"      \
            -x "README*"       \
            -x "LICENSE"       \
            -x "love-android/*"

      - name: Grant gradlew permission
        working-directory: love-android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: love-android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sanstale-mobile-debug
          path: love-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # --- Release signing (optional, requires repo secrets) ---
      - name: Sign and build release APK
        if: >
          github.event_name == 'push' &&
          github.ref == 'refs/heads/master' &&
          secrets.KEYSTORE_BASE64 != ''
        working-directory: love-android
        env:
          STORE_FILE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASS:     ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASS:       ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$STORE_FILE_B64" | base64 -d > keystore.jks
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/keystore.jks" \
            -Pandroid.injected.signing.store.password="$STORE_PASS"     \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS"           \
            -Pandroid.injected.signing.key.password="$KEY_PASS"

      - name: Upload release APK
        if: >
          github.event_name == 'push' &&
          github.ref == 'refs/heads/master' &&
          secrets.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: sanstale-mobile-release
          path: love-android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
