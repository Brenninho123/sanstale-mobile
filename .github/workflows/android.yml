name: Android Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout game
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager \
            "ndk;25.2.9519653" \
            "cmake;3.22.1"

      - name: Clone love-android 11.5
        run: git clone --depth 1 --branch 11.5.2 https://github.com/love2d/love-android love-android

      - name: Package game as .love
        run: |
          mkdir -p love-android/app/src/main/assets
          zip -9 -r love-android/app/src/main/assets/game.love . \
            -x "*.git*" \
            -x ".github/*" \
            -x "love-android/*" \
            -x "makefile" \
            -x "README*" \
            -x "LICENSE"

      - name: Build debug APK
        working-directory: love-android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --warning-mode all --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sanstale-mobile-debug
          path: love-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
